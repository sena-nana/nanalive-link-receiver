name: CI

on:
  push:
  pull_request:

jobs:
  protocol-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo test --lib
      - run: cargo clippy --all-targets -- -D warnings

  windows-msvc:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0
          targets: x86_64-pc-windows-msvc
          components: clippy
      - run: cargo check --all-targets --target x86_64-pc-windows-msvc
      - run: cargo test --lib --target x86_64-pc-windows-msvc
      - run: cargo clippy --all-targets --target x86_64-pc-windows-msvc -- -D warnings
      - run: cargo build --release --target x86_64-pc-windows-msvc
      - uses: actions/upload-artifact@v4
        with:
          name: nanalive-link-receiver-windows-x64
          path: target/x86_64-pc-windows-msvc/release/nanalive-link-receiver.exe
          if-no-files-found: error
